<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Deportivo Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header-deportivo">
        <h1>Centro de Entrenamiento Deportivo</h1>
        <p>Resultados y Programación en Tiempo Real</p>
    </header>

    <div class="contenedor-deportes">
        <!-- Tarjeta de Próximo Partido -->
        <div class="tarjeta-evento">
            <h3>⚽ Fútbol Masculino</h3>
            <p><strong>Próximo Encuentro:</strong> Sábado 15:00 PM</p>
            <p>Sede: Polideportivo Municipal</p>
            <span style="color: var(--primario); font-weight: bold;">Estado: Confirmado</span>
        </div>

        <!-- Tabla de Posiciones Simulada -->
        <div class="tarjeta-evento">
            <h3>🏆 Tabla de Posiciones</h3>
            <table style="width: 100%; border-collapse: collapse;">
                <tr style="background: #eee;">
                    <th>Equipo</th>
                    <th>PJ</th>
                    <th>Pts</th>
                </tr>
                <tr>
                    <td>Club A</td>
                    <td>5</td>
                    <td>12</td>
                </tr>
                <tr>
                    <td>Club B</td>
                    <td>5</td>
                    <td>10</td>
                </tr>
            </table>
        </div>
    </div>

</body>
</html>
